<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Docs</title>
  </head>
  <body>
    <div id="status">Pagina geladen</div>

    <script>
      document.getElementById("status").innerText += " | script start";
    </script>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>

    <script>
      document.getElementById("status").innerText += " | redoc script geladen";

      Redoc.init('./openapi.yaml', {}, document.body.appendChild(document.createElement('div')), function(err) {
        if (err) {
          document.getElementById("status").innerText += " | FOUT: " + err;
        } else {
          document.getElementById("status").innerText += " | ok";
        }
      });
    </script>
  </body>
</html>
